spring:
  config:
    activate:
      on-profile: docker
  mail:
    host: ${SPRING_MAIL_HOST:}
    port: ${SPRING_MAIL_PORT:25}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${SPRING_MAIL_SMTP_AUTH:true}
      mail.smtp.starttls.enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
      mail.smtp.ssl.enable: ${SPRING_MAIL_SMTP_SSL_ENABLE:false}
  datasource:
    druid:
      master:
        url: ${SPRING_DATASOURCE_DRUID_MASTER_URL:jdbc:mysql://mysql:3306/ry-vue?useUnicode=true&characterEncoding=utf8mb4&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=GMT%2B8}
        username: ${SPRING_DATASOURCE_DRUID_MASTER_USERNAME:ruoyi}
        password: ${SPRING_DATASOURCE_DRUID_MASTER_PASSWORD:password}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}

token:
  secret: ${TOKEN_SECRET:abcdefghijklmnopqrstuvwxyz}

ruoyi:
  profile: ${RUOYI_PROFILE:/data/ruoyi/uploadPath}
  # Docker 测试环境显式指定验证码类型，避免 profile 叠加时漂移
  captchaType: ${RUOYI_CAPTCHA_TYPE:math}

user:
  password:
    # Docker/dev 环境放宽密码重试限制，防止 E2E 测试触发锁定
    maxRetryCount: ${USER_PASSWORD_MAX_RETRY_COUNT:50}
    lockTime: ${USER_PASSWORD_LOCK_TIME:1}
    mail:
      from: ${SPRING_MAIL_FROM:}
      mailbox: ${PASSWORD_RESET_MAILBOX:}
      providerLogPath: ${PASSWORD_RESET_PROVIDER_LOG_PATH:}

management:
  endpoint:
    health:
      enabled: true
      show-details: never
  endpoints:
    web:
      exposure:
        include: health
