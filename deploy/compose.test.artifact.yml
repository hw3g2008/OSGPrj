services:
  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE is required}
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-druid,docker}
      MYSQL_HOST: ${MYSQL_SHARED_HOST:-host.docker.internal}
      MYSQL_PORT: ${MYSQL_SHARED_PORT:-23306}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ry-vue}
      MYSQL_APP_USER: ${MYSQL_APP_USER:-ruoyi}
      MYSQL_APP_PASSWORD: ${MYSQL_APP_PASSWORD:-app123456}
      REDIS_HOST: ${REDIS_SHARED_HOST:-host.docker.internal}
      REDIS_PORT: ${REDIS_SHARED_PORT:-26379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123456}
      JWT_SECRET: ${JWT_SECRET:-test-jwt-secret-change-me}
      RUOYI_PROFILE: ${RUOYI_PROFILE:-/data/ruoyi/uploadPath}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-25}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      SPRING_MAIL_FROM: ${SPRING_MAIL_FROM:-}
      SPRING_MAIL_SMTP_AUTH: ${SPRING_MAIL_SMTP_AUTH:-true}
      SPRING_MAIL_SMTP_STARTTLS_ENABLE: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:-true}
      SPRING_MAIL_SMTP_SSL_ENABLE: ${SPRING_MAIL_SMTP_SSL_ENABLE:-false}
      PASSWORD_RESET_MAILBOX: ${PASSWORD_RESET_MAILBOX:-}
      PASSWORD_RESET_PROVIDER_LOG_PATH: ${PASSWORD_RESET_PROVIDER_LOG_PATH:-}
    volumes:
      - backend_uploads:/data/ruoyi/uploadPath
    ports:
      - "${BACKEND_PORT:-28080}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s
    networks: [osg-net]

  admin:
    image: ${ADMIN_IMAGE:?ADMIN_IMAGE is required}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${ADMIN_PORT:-3005}:80"
    networks: [osg-net]

  student:
    image: ${STUDENT_IMAGE:?STUDENT_IMAGE is required}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${STUDENT_PORT:-3001}:80"
    networks: [osg-net]

  mentor:
    image: ${MENTOR_IMAGE:?MENTOR_IMAGE is required}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${MENTOR_PORT:-3002}:80"
    networks: [osg-net]

  lead-mentor:
    image: ${LEAD_MENTOR_IMAGE:?LEAD_MENTOR_IMAGE is required}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${LEAD_MENTOR_PORT:-3003}:80"
    networks: [osg-net]

  assistant:
    image: ${ASSISTANT_IMAGE:?ASSISTANT_IMAGE is required}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${ASSISTANT_PORT:-3004}:80"
    networks: [osg-net]

volumes:
  backend_uploads:
    name: ${COMPOSE_PROJECT_NAME:-osg}_backend_uploads

networks:
  osg-net:
    name: ${COMPOSE_PROJECT_NAME:-osg}_net
