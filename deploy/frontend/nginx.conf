server {
  listen 80;
  server_name _;

  # FIX-05: 合同附件等上传场景需要大于 nginx 默认 1MB；与后端 spring.servlet.multipart.max-request-size (200MB) 对齐
  client_max_body_size 200m;

  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass __API_PROXY_TARGET__/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # A-ST-012: 合同/学员附件等静态资源由后端 FileUploadUtils 写入 /profile/upload/
  # 后端通过 RuoYiConfig.getResourceMapping 暴露相同 URL，需 nginx 代理透传
  # 否则浏览器在前端 host 取该路径会 404
  location /profile/upload/ {
    proxy_pass __API_PROXY_TARGET__/profile/upload/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
