# Ticket 模板
# 路径: ${config.paths.tasks.tickets}T-{number}.yaml

id: "T-{number}"
story_id: "S-{story_number}"
title: "{标题}"
type: backend  # backend | frontend | frontend-ui | database | test | config
agent: null    # 可选：显式指定 Agent 名称（如不指定，由 type 自动映射）

status: pending  # pending | in_progress | done | blocked
estimate: "{n}m" # 2-5 分钟

# 允许修改的文件路径（严格限制）
allowed_paths:
  modify:
    - "{path/to/file}"
  read:                    # 可选：允许读取但不修改的文件
    - "{path/to/file}"

# 验收标准（人类可读摘要，不是唯一执行依据）
# 真正驱动实现 / 验证的是 covers_ac_refs + contract_refs + test_cases
acceptance_criteria:
  - "{验收标准1}"
  - "{验收标准2}"

# Story AC 覆盖映射（split-ticket 时必须生成）
covers_ac_refs: []  # 例如 ["AC-S-001-01"]

# Delivery / UI 契约映射（split-ticket 时必须生成）
contract_refs:
  capabilities: []       # 例如 ["auth-login"]
  critical_surfaces: []  # 例如 ["modal-forgot-password"]

# 可执行测试契约（split-ticket 时必须生成，禁止仅靠 prose AC）
test_cases: []
#   - test_case_id: "TCS-T-001-001"
#     ac_ref: "AC-S-001-01"
#     case_kind: "ac"  # ac | critical_surface
#     surface_id: null
#     state_variant: null
#     viewport_variant: null
#     category: "positive"   # positive | negative | boundary | exception | null_empty
#     scenario_obligation: "display"  # display | state_change | business_rule_reject | auth_or_data_boundary | persist_effect
#     operation: "list"  # list | search | create | edit | status_toggle | delete | reject_disable | auth_filter
#     description: "{测试描述}"
#     input: "{输入描述}"
#     expected: "{预期输出}"
#     covers_branches: ["B1", "B2"]
#     design_method: "equivalence_partitioning"

# UI 还原专属字段（type: frontend-ui 时必须生成）
