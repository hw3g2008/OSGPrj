# Ticket 模板
# 路径: ${config.paths.tasks.tickets}T-{number}.yaml

id: "T-{number}"
story_id: "S-{story_number}"
title: "{标题}"
type: backend  # backend | frontend | frontend-ui | database | test | config
agent: null    # 可选：显式指定 Agent 名称（如不指定，由 type 自动映射）

status: pending  # pending | in_progress | done | blocked
estimate: "{n}m" # 2-5 分钟

# 允许修改的文件路径（严格限制）
allowed_paths:
  modify:
    - "{path/to/file}"
  read:                    # 可选：允许读取但不修改的文件
    - "{path/to/file}"

# 验收标准
acceptance_criteria:
  - "{验收标准1}"
  - "{验收标准2}"

# Story AC 覆盖映射（split-ticket 时必须生成）
covers_ac_refs: []  # 例如 ["AC-S-001-01"]

# UI 还原专属字段（type: frontend-ui 时使用）
# prototype_ref: "${config.paths.docs.prototypes}{file}#section"
# design_tokens_ref: ".claude/project/agents/{agent}.md#设计 Token"

# 依赖的 Tickets
dependencies: []

# 时间戳
created_at: "{ISO8601_UTC}"
started_at: null
completed_at: null

# ============================================
# 🚨 验证证据（完成时必填，由 deliver-ticket Skill 自动写入）
# ============================================
# verification_evidence:
#   # 基本信息
#   command: "{实际执行的验证命令}"
#   exit_code: 0
#   timestamp: "{ISO8601_UTC}"
#   output_summary: "{关键输出摘要，如 'Tests run: 15, Failures: 0'}"
#
#   # 测试结果（backend/database/test/frontend 类型）
#   test_result:
#     total: 15              # 总测试数
#     passed: 15             # 通过数
#     failed: 0              # 失败数
#     skipped: 0             # 跳过数
#     duration_ms: 3500      # 执行时间（毫秒）
#
#   # 覆盖率结果（backend/database/test 类型必填）
#   coverage:
#     line:
#       covered: 180         # 覆盖行数
#       total: 200           # 总行数
#       percentage: 90.0     # 覆盖率 %
#     branch:
#       covered: 50          # 覆盖分支数
#       total: 50            # 总分支数
#       percentage: 100.0    # 覆盖率 %（必须 100%）
#     method:
#       covered: 25          # 覆盖方法数
#       total: 25            # 总方法数
#       percentage: 100.0    # 覆盖率 %
#
#   # 未覆盖的代码（如有）
#   uncovered_lines: []      # 未覆盖的行号列表
#   uncovered_branches: []   # 未覆盖的分支列表

