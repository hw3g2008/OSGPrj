# ============================================
# OSG 职业培训平台 - 项目配置
# ============================================

# 项目基本信息
name: "osg-platform"
type: fullstack
description: "金融行业求职培训 B2C 平台"

# 技术栈
tech_stack:
  backend:
    language: java
    runtime: "Java 21"
    framework: spring-boot
    version: "3.x"
    orm: mybatis
  frontend:
    language: typescript
    framework: vue
    version: "3.x"
    ui: ant-design-vue
    state: pinia
    package_manager: pnpm
  database:
    type: mysql
    version: "8.0"
  cache:
    type: redis

# 命令映射
commands:
  # 后端命令
  test: "mvn test"
  test-single: "mvn test -Dtest={class}"
  build: "mvn -DskipTests package"
  lint: "mvn checkstyle:check"
  run: "bash bin/run-backend-dev.sh deploy/.env.dev"
  
  # 前端命令（pnpm workspace 子包直接调用）
  frontend:
    install: "cd osg-frontend && pnpm install"
    build: "pnpm --dir osg-frontend/packages/admin build"
    build-all: "cd osg-frontend && pnpm build:all"
    lint: "cd osg-frontend && pnpm lint"
    test: "pnpm --dir osg-frontend/packages/admin test"
    dev: "pnpm --dir osg-frontend/packages/admin dev"
    dev-student: "pnpm --dir osg-frontend/packages/student dev"
    dev-mentor: "pnpm --dir osg-frontend/packages/mentor dev"
    dev-lead-mentor: "pnpm --dir osg-frontend/packages/lead-mentor dev"
    dev-assistant: "pnpm --dir osg-frontend/packages/assistant dev"
    dev-admin: "pnpm --dir osg-frontend/packages/admin dev"
  
  # 运维命令
  ops:
    docker_build: "bash bin/docker-env-build.sh test --profile core"
    docker_run: "bash bin/docker-env-up.sh test --profile core"
    logs: "bash bin/docker-env-logs.sh test --profile core"
    health: "curl -sS --max-time 5 \"${BASE_HEALTH_URL:-http://127.0.0.1:28080/actuator/health}\""
    e2e_api_gate: "bash bin/e2e-api-gate.sh {module} full"
    ui_visual_gate: "bash bin/ui-visual-gate.sh {module}"

# 目录约定
paths:
  backend:
    source: "ruoyi-*/src/main/java/"
    tests: "ruoyi-*/src/test/java/"
    controllers: "ruoyi-admin/src/main/java/**/controller/"
    services: "ruoyi-system/src/main/java/**/service/"
    mappers: "ruoyi-system/src/main/java/**/mapper/"
  frontend:
    source: "osg-frontend/packages/"
    admin: "osg-frontend/packages/admin/"              # 管理后台（Vue 3 + Ant Design Vue）
    admin_legacy: "ruoyi-ui/"                           # 若依前端（保留做运维）
    components: "osg-frontend/packages/shared/src/components/"
    pages: "osg-frontend/packages/*/src/views/"
    api: "osg-frontend/packages/shared/src/api/"
    types: "osg-frontend/packages/shared/src/types/"
  docs:
    spec: "osg-spec-docs/docs/"
    source: "osg-spec-docs/source/"                     # 原始文档（md/docx 仅作参考，不作为需求来源）
    prototypes: "osg-spec-docs/source/prototype/"       # UI 原型 HTML（SSOT 唯一真实来源）
    prd: "osg-spec-docs/docs/01-product/prd/"           # PRD 文档（从 HTML 原型生成，按模块子目录）
    api: "osg-spec-docs/docs/06-api/"
    database: "osg-spec-docs/docs/07-database/"
    requirements: "osg-spec-docs/docs/02-requirements/"
    srs: "osg-spec-docs/docs/02-requirements/srs/"
  tasks:
    root: "osg-spec-docs/tasks/"
    state: "osg-spec-docs/tasks/STATE.yaml"
    stories: "osg-spec-docs/tasks/stories/"
    tickets: "osg-spec-docs/tasks/tickets/"
    test_matrices: "osg-spec-docs/tasks/test-matrices/"

# ============================================
# 机器真值：运行时模型 / 环境身份 / 流程策略
# ============================================
runtime_model:
  dev:
    description: "本机运行 app/backend，连接阿里云测试服务器 Docker MySQL/Redis"
    backend:
      execution: local
      entrypoint: "bash bin/run-backend-dev.sh deploy/.env.dev"
      port: 28080
      base_url: "http://127.0.0.1:28080"
    frontends:
      execution: local
      admin_port: 3005
    dependencies:
      mysql: shared_remote
      redis: shared_remote
      runtime_contract: "deploy/runtime-contract.dev.yaml"
      env_file: "deploy/.env.dev"
  test:
    description: "阿里云 Docker 运行 backend/frontends，复用阿里云共享 MySQL/Redis"
    selection:
      explicit_activation_env: RUNTIME_STACK_TEST_MODE
      explicit_activation_value: "1"
      forbid_probe_types:
        - docker_container_running
    backend:
      execution: remote_docker
      entrypoint: "bash bin/deploy-server-docker.sh test"
      port: 28080
      base_url: "http://47.94.213.128:28080"
    frontends:
      execution: remote_docker
      ports:
        student: 3001
        mentor: 3002
        lead_mentor: 3003
        assistant: 3004
        admin: 3005
    dependencies:
      mysql: shared_remote
      redis: shared_remote
      runtime_contract: "deploy/runtime-contract.test.yaml"
      env_file: "deploy/.env.test"
  prod:
    description: "生产环境预留结构；部署时必须由独立 prod runtime contract 驱动"
    backend:
      execution: remote_docker
    frontends:
      execution: remote_docker
    dependencies:
      mysql: dedicated_container
      redis: dedicated_container

environment_identity:
  local_host:
    loopback_backend: "127.0.0.1:28080"
    docker_context_must_not_be_remote_test_truth: true
  shared_remote_deps:
    host: "47.94.213.128"
    mysql:
      port: 23306
      container_location: aliyun_docker
    redis:
      port: 26379
      container_location: aliyun_docker
  remote_test_stack:
    host: "47.94.213.128"
    ports:
      backend: 28080
      student: 3001
      mentor: 3002
      lead_mentor: 3003
      assistant: 3004
      admin: 3005
    compose_project: "osg_test"

workflow_policy:
  default_delivery_flow:
    - brainstorm
    - split_story
    - split_ticket
    - implement
    - verify
    - final_gate
    - final_closure
  project_framework_is_primary: true
  superpowers_usage: framework_or_process_correction_only
  superpowers_not_for_normal_feature_delivery: true
  normal_business_delivery_forbid_superpowers: true
  enforced_gate_entrypoints:
    - brainstorm
    - approve_brainstorm
    - split_story
    - split_ticket
    - verify
    - final_gate

ui_delivery_policy:
  strict_visual_contract: true
  forbid_diff_threshold_relaxation: true
  forbid_snapshot_bypass: true
  forbid_mask_waiver: true
  require_failure_evidence: true
  require_single_runtime_before_visual_gate: true
  required_repair_chain:
    - single_case_verify
    - module_verify
    - ui_visual_gate
    - final_gate
    - final_closure

context_preflight:
  script: "bin/context-preflight.sh"
  required_modes:
    - dev
    - test
  optional_modes:
    - prod
  enforced_entrypoints:
    - run-backend-dev
    - run-dev-shared
    - deploy-test-remote
    - deploy-server-docker

# ============================================
# PRD 生成流程（IEEE 830 + BABOK 行业标准）
# ============================================
prd_process:
  # 唯一真实来源（Single Source of Truth）
  ssot: "HTML 原型文件（${paths.docs.prototypes}）"
  truth_source:
    type: html_prototype
    root: "${paths.docs.prototypes}"
    single_source_of_truth: true
    derived_artifacts:
      - "${paths.docs.prd}**"
      - "${paths.docs.srs}**"
      - "${paths.tasks.stories}**"
      - "${paths.tasks.tickets}**"
      - "${paths.tasks.root}testing/**"
    forbid_source_absent_derivation: true
    require_source_backtrace_for_ui: true
  truth_sync:
    enabled: true
    required_decision_fields:
      - ui_truth_change
      - prototype_synced
    enforced_entrypoints:
      - brainstorm
      - approve_brainstorm
      - split_story
      - split_ticket
      - verify
      - final_gate
  
  # 需求工程流水线
  # HTML 原型 → PRD（页面级）→ SRS（IEEE 830）→ Stories → Tickets
  pipeline:
    - step: "PRD 生成"
      input: "${paths.docs.prototypes}/*.html"
      output: "${paths.docs.prd}/{module}/"
      format: "页面级 PRD（字段定义、交互规则、业务规则、决策记录）"
      trigger: "/brainstorm 自动检测并生成"
    - step: "SRS 生成（brainstorm 产物）"
      input: "${paths.docs.prd}/{module}/"
      output: "${paths.docs.srs}/{module}.md"
      format: "IEEE 830（FR/NFR/AC/接口定义/数据模型/PRD溯源）"
  
  # 强制规则
  rules:
    - "HTML 原型是唯一真实来源，md/docx 文档仅作业务背景参考"
    - "PRD 按模块子目录存放（如 prd/admin/, prd/career/）"
    - "每个 FR 必须标注 PRD 来源（文件名 + 章节号）"
    - "SRS 必须包含接口定义（已有接口 + 新增接口）和数据库变更"
    - "PRD 不存在时，brainstorm 流程自动从 HTML 原型生成 PRD"
  
  # 原型到模块的映射（按业务功能划分，每个模块独立目录）
  module_prototype_map:
    permission: ["admin.html"]              # 权限管理（home + roles + admins + base-data）
    user-center: ["admin.html"]             # 用户中心（students + contracts + staff + mentor-schedule）
    teaching: ["admin.html"]                # 教学中心（class-records + communication）
    finance: ["admin.html"]                 # 财务中心（finance + expense）
    resource: ["admin.html"]                # 资源中心（files + test-bank + interview-bank + questions）
    notification: ["admin.html"]            # 个人中心/系统（mailjob + notice + complaints + logs）
    career: ["index.html", "lead-mentor.html", "assistant.html", "admin.html"]  # 求职中心（跨端）
    student: ["index.html", "PRD_Student.html"]
    mentor: ["mentor.html", "PRD_Mentor.html"]

# 启用的开发者角色
developers:
  - backend-java
  - frontend-vue
  - frontend-admin    # 管理后台前端（UI 还原 + 功能实现）
  - dba-mysql

# 业务角色
roles:
  - student      # 学生
  - mentor       # 导师
  - lead-mentor  # 班主任
  - assistant    # 助教
  - admin        # 管理员

# 前端端口配置
ports:
  student: 3001
  mentor: 3002
  lead-mentor: 3003
  assistant: 3004
  admin: 3005          # 管理后台（osg-frontend/packages/admin）
  admin_legacy: 8080   # 若依管理后台（ruoyi-ui，保留做运维）

# 审批配置
approval:
  brainstorm_confirm: required # 需求确认必须人工审批
  story_split: required      # Story 拆分后需要审批
  ticket_split: auto         # Ticket 拆分后自动继续
  ticket_done: auto          # Ticket 完成后自动继续
  story_done: auto           # Story 完成后自动继续下一个

# 自动执行限制
limits:
  max_iterations: 20         # 最大迭代次数
  max_retries: 3             # 最大重试次数
  ticket_timeout: 30         # Ticket 超时（分钟）

# ============================================
# 🚨 测试配置（重中之重）
# ============================================
testing:
  # 覆盖率门槛
  coverage:
    enabled: true
    # 后端/数据库/测试类型
    backend:
      branch: 100            # 分支覆盖率必须 100%
      line: 90               # 行覆盖率 ≥ 90%
      method: 90             # 方法覆盖率 ≥ 90%
    # 前端功能类型（soft: 仅告警不阻塞，待测试覆盖业务代码后改为 hard）
    frontend:
      branch: 90             # 分支覆盖率 ≥ 90%
      line: 80               # 行覆盖率 ≥ 80%
      enforcement: soft      # soft=告警 | hard=阻塞
    # 前端 UI 还原类型（soft: 仅告警不阻塞）
    frontend_ui:
      branch: 80             # 分支覆盖率 ≥ 80%
      line: 70               # 行覆盖率 ≥ 70%
      enforcement: soft      # soft=告警 | hard=阻塞

  # 测试命令
  commands:
    backend:
      test: "mvn test"
      test_single: "mvn test -Dtest={TestClass}"
      test_coverage: "mvn test jacoco:report"
      coverage_check: "mvn jacoco:check"
      coverage_report: "target/site/jacoco"
    frontend:
      test: "pnpm --dir osg-frontend/packages/admin test"
      test_single: "pnpm --dir osg-frontend/packages/admin test {testFile}"
      test_coverage: "pnpm --dir osg-frontend/packages/admin test --coverage"
      coverage_report: "osg-frontend/packages/admin/coverage"

  # 集成测试
  integration:
    enabled: true
    command: "mvn verify -Pintegration-test"
    timeout: 600             # 10 分钟

  # 测试用例设计要求
  design:
    # 必须应用的设计方法
    required_methods:
      - equivalence_partitioning    # 等价类划分
      - boundary_value_analysis     # 边界值分析
      - decision_table              # 决策表测试
    # 可选的设计方法
    optional_methods:
      - state_transition            # 状态转换测试
      - cause_effect                # 因果图法
    # 必须覆盖的测试类型
    required_test_types:
      - positive                    # 正向测试
      - negative                    # 负向测试
      - boundary                    # 边界测试
      - exception                   # 异常测试
      - null_empty                  # null/空值测试

  # API 测试维度
  api_test_dimensions:
    - happy_path                    # 正向测试
    - negative                      # 负向测试
    - boundary                      # 边界测试
    - security                      # 安全测试
    - performance                   # 性能测试（可选）

  # E2E 测试（Playwright）
  e2e:
    enabled: true
    framework: playwright
    command: "bash bin/e2e-api-gate.sh {module} full"
    visual_gate_command: "bash bin/ui-visual-gate.sh {module}"
    report: "osg-frontend/playwright-report"
    trigger: "manual"              # manual = 手动触发, auto = all_stories_done 时自动
